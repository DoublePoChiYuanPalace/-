<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二重埔慈元宮 - 神明聖號認證選擇題</title>
    <style>
        /* 全域樣式與平滑滾動 */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #fffde7; /* 溫暖的淺黃色背景 */
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* 固定在頂部的導覽列 */
        header {
            background-color: #ffeb3b; /* 小新亮黃色 */
            padding: 15px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #e53935; /* 經典紅色 */
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        
        .logo img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        nav a {
            color: #0288d1; /* 動感超人藍 */
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #e53935;
        }

        /* 遊戲專用容器區塊 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            /* 頂部推開 180px，確保不被擋住 */
            padding: 180px 20px 40px 20px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1.game-title {
            color: #e53935;
            border-bottom: 3px solid #ffeb3b;
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }

        .scoreboard {
            font-size: 1.3rem;
            margin-bottom: 20px;
            background: white;
            padding: 10px 30px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-weight: bold;
            display: flex;
            gap: 30px;
            border: 2px solid #ffeb3b;
        }

        .score-item span { color: #e53935; }

        .game-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            gap: 40px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            align-items: center;
        }

        .options-column { display: flex; flex-direction: column; gap: 20px; width: 100%; }

        .option-btn {
            background-color: #fff;
            border: 2.5px solid #0288d1;
            color: #2c3e50;
            padding: 22px 25px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) { background-color: #e3f2fd; }
        .option-btn.correct { background-color: #2ec4b6 !important; border-color: #2ec4b6 !important; color: white !important; }
        .option-btn.wrong { background-color: #e53935 !important; border-color: #e53935 !important; color: white !important; }

        .photo-column {
            display: flex; justify-content: center; align-items: center;
            background: #fafafa; border: 2px solid #e0e0e0; border-radius: 12px;
            height: 450px; overflow: hidden; padding: 20px;
        }
        .photo-column img { width: 100%; height: 100%; object-fit: contain; }

        .result-screen { display: none; text-align: center; background: white; padding: 50px; border-radius: 15px; }

        .control-btn {
            margin-top: 25px; padding: 12px 40px; font-size: 1.1rem;
            background-color: #e53935; color: white; border: none; border-radius: 5px;
            cursor: pointer; font-weight: bold;
        }

        /* 📱 手機版 RWD 響應式網頁調適 */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; text-align: center; }
            nav { margin-top: 12px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
            nav a { margin-left: 0; font-size: 14px; }
            .container { padding-top: 240px; }
            .game-container { grid-template-columns: 1fr; }
            .photo-column { order: -1; height: 300px; }
        }

        footer { text-align: center; padding: 25px; background-color: #0288d1; color: white; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="imageshw/logo.webp" alt="二重埔慈元宮 Logo"></a>
            <nav>
                <a href="index.html">首頁</a>
                <a href="act.html">活動</a>
                <a href="god.html">神明介紹</a>
                <a href="ann.html">公告</a>
                <a href="rec.html">紀錄</a>
                <a href="tmf.html">媽祖會</a>
                <a href="game.html">小遊戲</a>
                <a href="https://www.facebook.com/DoublePoChiYuanPalace?locale=zh_TW" target="_blank">FB官網</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 class="game-title">神明聖號認證挑戰</h1>
        
        <div class="scoreboard" id="scoreboardBar">
            <div class="score-item">進度：<span id="currentQuestionNum">1</span> / 21</div>
            <div class="score-item">目前得分：<span id="scoreDisplay">0</span></div>
        </div>
        
        <div class="game-container" id="quizBox">
            <div class="options-column" id="optionsContainer"></div>
            <div class="photo-column">
                <img id="godImage" src="" alt="請辨識這位神明尊尊">
            </div>
        </div>

        <div class="result-screen" id="resultBox">
            <h2>恭喜完成全部挑戰！</h2>
            <p>您的最終得分為</p>
            <div class="result-score"><span id="finalScore">0</span> 分</div>
            <p id="evaluationText"></p>
            <button class="control-btn" onclick="startNewGame()">再挑戰一次</button>
        </div>

        <button class="control-btn" id="resetBtn" onclick="startNewGame()">重新開始</button>
    </div>

    <footer>
        <p>(02)29952808</p>
        <p>三重區五谷王北街50巷35號</p>
    </footer>

    <script>
        // (程式碼邏輯保持不變，已整合進上述結構)
        const dataSource = [
            { id: 1, name: "天上聖母(大媽)", displayName: "天上聖母(大媽)", img: "imageshw/DM.webp" },
            { id: 2, name: "天上聖母(二媽)", displayName: "天上聖母(二媽)", img: "imageshw/erM.webp" },
            { id: 3, name: "天上聖母(三媽)", displayName: "天上聖母(三媽)", img: "imageshw/SM.webp" }, 
            { id: 4, name: "中壇元帥(南天太子)", displayName: "中壇元帥(南天太子)", img: "imageshw/NT.webp" },
            { id: 5, name: "中壇元帥(九龍太子)", displayName: "中壇元帥(九龍太子)", img: "imageshw/JL.webp" },
            { id: 6, name: "中壇元帥(小太子)", displayName: "中壇元帥(小太子)", img: "imageshw/X.webp" },
            { id: 7, name: "中壇元帥(蓮花太子)", displayName: "中壇元帥(蓮花太子)", img: "imageshw/LH.webp" },
            { id: 8, name: "濟公師父", displayName: "濟公師父", img: "imageshw/JG.webp" },
            { id: 9, name: "關聖帝君", displayName: "關聖帝君", img: "imageshw/DDJ.webp" }, 
            { id: 10, name: "關聖帝君", displayName: "關聖帝君", img: "imageshw/XDJ.webp" }, 
            { id: 11, name: "觀世音菩薩", displayName: "觀世音菩薩", img: "imageshw/GShY.i.webp" },
            { id: 12, name: "瑤池金母", displayName: "瑤池金母", img: "imageshw/MN.webp" },
            { id: 13, name: "福德正神", displayName: "福德正神", img: "imageshw/TDG.webp" },
            { id: 14, name: "千里眼", displayName: "千里眼將軍", img: "imageshw/QLY.i.webp" },
            { id: 15, name: "順風耳", displayName: "順風耳將軍", img: "imageshw/ShFer.webp" },
            { id: 16, name: "虎爺將軍(下山虎)", displayName: "虎爺將軍(下山虎)", img: "imageshw/HY.i.webp" },
            { id: 17, name: "李仙祖", displayName: "李仙祖", img: "imageshw/LTG.webp" },
            { id: 18, name: "玄天上帝", displayName: "玄天上帝", img: "imageshw/XT.webp" },
            { id: 19, name: "天上聖母(三媽)", displayName: "天上聖母(三媽)", img: "imageshw/SM1.webp" }, 
            { id: 20, name: "黑虎將軍", displayName: "黑虎將軍", img: "imageshw/HH.webp" },
            { id: 21, name: "五營", displayName: "五營將軍", img: "imageshw/W.uY.i.webp" }
        ];

        let gameQuestions = []; 
        let currentIndex = 0;   
        let currentScore = 0;   
        let isAnswered = false; 

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startNewGame() {
            gameQuestions = shuffle(dataSource); 
            currentIndex = 0;
            currentScore = 0;
            isAnswered = false;

            document.getElementById('quizBox').style.display = 'grid';
            document.getElementById('scoreboardBar').style.display = 'flex';
            document.getElementById('resetBtn').style.display = 'inline-block';
            document.getElementById('resultBox').style.display = 'none';

            updateScoreboard();
            loadQuestion();
        }

        function updateScoreboard() {
            document.getElementById('currentQuestionNum').innerText = currentIndex + 1;
            document.getElementById('scoreDisplay').innerText = currentScore;
        }

        function loadQuestion() {
            isAnswered = false;
            const currentQuestion = gameQuestions[currentIndex];
            document.getElementById('godImage').src = currentQuestion.img;
            let options = [currentQuestion.displayName];
            let wrongPool = dataSource.filter(item => item.displayName !== currentQuestion.displayName);
            let uniqueWrongNames = Array.from(new Set(wrongPool.map(item => item.displayName)));
            uniqueWrongNames = shuffle(uniqueWrongNames);
            for(let i = 0; i < 3; i++) { if (uniqueWrongNames[i]) options.push(uniqueWrongNames[i]); }
            options = shuffle(options);
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            options.forEach(optName => {
                const button = document.createElement('button');
                button.classList.add('option-btn');
                button.innerText = optName; 
                button.onclick = () => checkAnswer(optName, currentQuestion.displayName, button);
                container.appendChild(button);
            });
        }

        function checkAnswer(selectedName, correctName, clickedButton) {
            if (isAnswered) return; 
            isAnswered = true;
            const buttons = document.querySelectorAll('.option-btn');
            if (selectedName === correctName) {
                clickedButton.classList.add('correct');
                currentScore += 5; 
            } else {
                clickedButton.classList.add('wrong');
                buttons.forEach(btn => { if (btn.innerText === correctName) btn.classList.add('correct'); });
            }
            buttons.forEach(btn => btn.disabled = true);
            setTimeout(() => {
                currentIndex++;
                if (currentIndex < gameQuestions.length) {
                    updateScoreboard();
                    loadQuestion();
                } else {
                    showFinalResult();
                }
            }, 1500);
        }

        function showFinalResult() {
            document.getElementById('quizBox').style.display = 'none';
            document.getElementById('scoreboardBar').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            document.getElementById('finalScore').innerText = currentScore;
            let evalText = "";
            if (currentScore >= 100) evalText = "😇 太厲害了！您對慈元宮諸神瞭若指掌！";
            else if (currentScore >= 70) evalText = "🙏 功德圓滿！您對本宮神尊非常熟悉！";
            else evalText = "⛩️ 沒關係，多參拜、多看神明介紹頁面就會更熟悉囉！";
            document.getElementById('evaluationText').innerText = evalText;
        }

        window.onload = startNewGame;
    </script>
</body>
</html>
