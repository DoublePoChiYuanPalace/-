<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二重埔慈元宮 - 宮廟歷史紀錄</title>
    <style>
        /* =========================================
           1. 原有的基礎樣式（保持不變）
           ========================================= */
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", 'Arial', 'Microsoft JhengHei', sans-serif;
            background-color: #fffde7; /* 溫暖的淺黃色背景 */
            color: #333333;
            margin: 0;
            padding: 0;
        }

        /* 固定在頂部的導覽列 */
        header {
            background-color: #ffeb3b; /* 亮黃色 */
            padding: 15px 20px;       
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap; /* 支援手機端自動換行 */
        }

        .logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        
        .logo img {
            display: block;
            width: 100px;
            height: 100px;
        }

        nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        nav a {
            color: #0288d1; /* 動感超人藍 */
            text-decoration: none;
            margin-left: 20px;
            margin-top: 5px;
            margin-bottom: 5px;
            font-weight: bold;
            transition: color 0.3s;
            white-space: nowrap; /* 防止中文字斷行 */
        }

        nav a:hover {
            color: #e53935; /* 經典紅色 */
        }

        /* 主要內容置中區塊 */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 180px 15px 40px 15px; /* 配合 Logo 頂部間距 */
            box-sizing: border-box;
        }

        /* 紀錄卡片樣式 */
        .record-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 35px;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid #ffeb3b;
        }

        /* 標題與時間區塊 */
        .record-header {
            margin-bottom: 15px;
            border-left: 4px solid #e41e3f; /* 宮廟紅裝飾線 */
            padding-left: 10px;
        }

        .record-title {
            font-size: 20px;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #111111;
        }

        .record-time {
            font-size: 13px;
            color: #777777;
            margin: 0;
        }

        /* 文字敘述 */
        .record-content {
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 15px;
            white-space: pre-line; /* 支援文字直接換行 */
            color: #444444;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 25px;
            background-color: #0288d1;
            color: white;
            font-weight: bold;
            margin-top: 40px;
        }

        /* =========================================
           2. 優化後的圖片格線與 Lightbox CSS (新增/修改)
           ========================================= */
        
        /* 圖片外層區塊 */
        .record-image-container {
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            display: grid;
            gap: 8px; /* 圖片之間的間距 */
        }

        /* [關鍵] 單張圖片時的縮圖樣式 */
        .single-image-container {
            grid-template-columns: 1fr;
        }
        
        /* [關鍵] 多張圖片時的縮圖樣式 (變成 3 欄整齊格線) */
        .multi-image-container {
            grid-template-columns: repeat(3, 1fr); /* 電腦端 3 欄 */
        }

        /* 縮圖本身的樣式 */
        .record-thumbnail {
            width: 100%;
            height: 150px; /* [關鍵] 統一縮圖高度，防止照片太長 */
            object-fit: cover; /* 裁剪圖片以填滿區域，不變形 */
            display: block;
            border-radius: 4px;
            cursor: pointer; /*滑鼠移上去變成手指，提示可點擊 */
            transition: opacity 0.2s, transform 0.2s;
        }
        
        .record-thumbnail:hover {
            opacity: 0.8; /* 滑鼠移上去變淡 */
            transform: scale(1.02); /* 微幅放大 */
        }

        /* 如果只有一張圖，可以讓它高一點 */
        .single-image-container .record-thumbnail {
            height: 250px; 
        }

        /* =========================================
           3. Lightbox 彈出視窗 CSS (完全新增)
           ========================================= */
        .lightbox-overlay {
            display: none; /* 預設是隱藏的 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9); /* FB 風格的黑色半透明背景 */
            z-index: 2000; /* 確保在最上層 */
            justify-content: center;
            align-items: center;
            cursor: zoom-out; /* 提示點擊可關閉 */
        }

        /* 彈出視窗內的大圖 */
        .lightbox-image {
            max-width: 90%; /* 防止圖片超出螢幕寬度 */
            max-height: 90%; /* 防止圖片超出螢幕高度 */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            cursor: default; /* 在圖片上恢復預設滑鼠 */
        }

        /* 關閉按鈕 */
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #ffffff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        /* 手機板響應式微調 */
        @media (max-width: 768px) {
            .nav-container { justify-content: center; flex-direction: column; }
            nav { justify-content: center; margin-top: 10px; }
            nav a { margin: 5px 10px; }
            .container { padding-top: 240px; }
            
            /* 手機上多圖變成 2 欄，避免縮圖太小 */
            .multi-image-container {
                grid-template-columns: repeat(2, 1fr); 
            }
            .record-thumbnail {
                height: 120px; /* 手機縮圖矮一點 */
            }
            .lightbox-close {
                top: 10px;
                right: 20px;
            }
        }
    </style>
</head>
<body>

    <!-- =========================================
         4. Lightbox 彈出視窗 HTML 結構 (完全新增)
         ========================================= -->
    <!-- 這個區塊預設是隱藏的，只有點擊縮圖時才會被 JS 呼叫出來 -->
    <div id="lightboxOverlay" class="lightbox-overlay">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImage" src="" alt="放大照片" class="lightbox-image">
    </div>

    <!-- =========================================
         5. Lightbox 互動 JavaScript (完全新增)
         ========================================= -->
    <script>
        // 取得必要的 HTML 元素
        const thumbnails = document.querySelectorAll('.record-thumbnail');
        const overlay = document.getElementById('lightboxOverlay');
        const lightboxImg = document.getElementById('lightboxImage');
        const closeBtn = document.querySelector('.lightbox-close');

        // [功能1] 開啟 Lightbox
        // 幫頁面上所有縮圖加上點擊事件
        thumbnails.forEach(thumb => {
            thumb.addEventListener('click', function() {
                // 1. 把縮圖的 src (路徑) 給大圖
                lightboxImg.src = this.src;
                // 2. 顯示黑色彈出視窗 (利用 flex 置中)
                overlay.style.display = 'flex';
                // 3. 為了防止圖片太長導致外層出現滾動條，開啟時把 body 鎖住
                document.body.style.overflow = 'hidden';
            });
        });

        // [功能2] 關閉 Lightbox
        // 定義一個關閉的函式
        function closeLightbox() {
            overlay.style.display = 'none'; // 隱藏視窗
            lightboxImg.src = ''; // 清空圖片路徑，節省資源
            document.body.style.overflow = 'auto'; // 恢復網頁滾動
        }

        // 點擊關閉按鈕時關閉
        closeBtn.addEventListener('click', closeLightbox);

        // 點擊黑色背景處 (也就是 overlay 本身) 時也關閉，像 FB 一樣
        overlay.addEventListener('click', function(e) {
            // 確保點擊的是黑色背景 (overlay) 而不是圖片本身
            if (e.target === overlay) {
                closeLightbox();
            }
        });
    </script>

</body>
